<title>ATM</title>
<style>
:root{
  --bg:#070A0F;--surf:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.09);
  --teal:#5AC8FA;--green:#30D158;--gold:#FFD60A;
  --text:#F2F2F7;--muted:rgba(242,242,247,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,Arial,sans-serif;overflow:hidden}

/* ── Launcher ─────────────────────────────────────────────── */
#launcher{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;padding:24px;
  padding-top:calc(env(safe-area-inset-top,0px) + 24px);
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px);
  overflow-y:auto;text-align:center}
.l-logo{width:140px;height:140px;border-radius:50%;object-fit:cover;margin:0 auto 20px;display:block;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(168,184,202,0.12)}
.l-sub{font-size:12px;color:var(--muted);margin:6px 0 40px;text-align:center}
.l-card{width:100%;max-width:340px;background:var(--surf);border:1px solid var(--border);
  border-radius:18px;padding:22px 20px;margin-bottom:14px;cursor:pointer;
  display:flex;align-items:center;gap:16px;transition:transform .1s,border-color .2s}
.l-card:active{transform:scale(.98)}
.l-card.logger{border-color:rgba(48,209,88,0.3)}
.l-card.filter{border-color:rgba(90,200,250,0.3)}
.l-icon{font-size:30px;width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.l-card.logger .l-icon{background:rgba(48,209,88,0.12)}
.l-card.filter .l-icon{background:rgba(90,200,250,0.12)}
.l-name{font-size:17px;font-weight:700}
.l-card.logger .l-name{color:var(--green)}
.l-card.filter .l-name{color:var(--teal)}
.l-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.l-foot{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 18px);
  font-size:9px;color:rgba(255,255,255,0.18);text-align:center;line-height:1.7}

/* ── App bar ──────────────────────────────────────────────── */
#appbar{position:fixed;top:0;left:0;right:0;z-index:50;display:none;
  background:rgba(7,10,15,0.97);border-bottom:1px solid var(--border);
  padding-top:env(safe-area-inset-top)}
.bar-inner{display:flex;align-items:center;height:42px;padding:0 8px;gap:6px}
.bar-btn{padding:7px 12px;border-radius:10px;font-size:12px;font-weight:600;
  color:var(--muted);cursor:pointer;background:var(--surf);border:1px solid var(--border)}
.bar-btn:active{opacity:.7}
.bar-title{flex:1;text-align:center;font-size:13px;font-weight:700}
.bar-title.logger{color:var(--green)}
.bar-title.filter{color:var(--teal)}

/* ── Frames ───────────────────────────────────────────────── */
.frame{position:fixed;left:0;right:0;bottom:0;width:100%;border:0;display:none;
  top:calc(env(safe-area-inset-top) + 42px);height:calc(100% - env(safe-area-inset-top) - 42px);
  background:var(--bg)}
.frame.active{display:block}

.l-emblem-wrap{position:relative;width:172px;height:172px;margin:0 auto 20px}
.l-emblem-wrap .l-logo{position:absolute;top:16px;left:16px;width:140px;height:140px;margin:0}
.l-prog-ring{position:absolute;top:0;left:0;pointer-events:none}
#l-prog-fill{transition:stroke-dashoffset 1.4s cubic-bezier(.22,.61,.36,1)}
.l-prog-label{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--chrome-mid,#A8B8CA);
  background:rgba(10,14,21,0.85);padding:2px 8px;border-radius:8px;white-space:nowrap;border:1px solid var(--steel,#2A3645)}
</style>
</head>

<script>
var current = null;        // 'logger' | 'filter' | null
var loggerUsed = false;    // logger viewed since filter last loaded

function loadFrame(name) {
  var f = document.getElementById('frame-' + name);
  if (!f.src) f.src = f.getAttribute('data-src');
  return f;
}

function openApp(name) {
  var launcher = document.getElementById('launcher');
  var appbar   = document.getElementById('appbar');
  var title    = document.getElementById('bar-title');
  var sw       = document.getElementById('bar-switch');

  // Filter must re-read localStorage if the logger was used since its last load
  var f = loadFrame(name);
  if (name === 'filter' && loggerUsed && f.src) {
    try { f.contentWindow.location.reload(); } catch(e) { f.src = f.getAttribute('data-src'); }
    loggerUsed = false;
  }
  if (name === 'logger') loggerUsed = true;

  document.querySelectorAll('.frame').forEach(function(fr){ fr.classList.remove('active'); });
  f.classList.add('active');

  launcher.style.display = 'none';
  appbar.style.display = 'block';
  title.textContent = name === 'logger' ? 'Trade Logger' : 'Trade Filter';
  title.className = 'bar-title ' + name;
  sw.textContent = name === 'logger' ? 'Filter \u2192' : 'Logger \u2192';
  current = name;
}

function switchApp() {
  openApp(current === 'logger' ? 'filter' : 'logger');
}

function goHome() {
  document.querySelectorAll('.frame').forEach(function(fr){ fr.classList.remove('active'); });
  document.getElementById('appbar').style.display = 'none';
  document.getElementById('launcher').style.display = 'flex';
  current = null;
}
</script>

<script>
(function(){
  try {
    var trades = JSON.parse(localStorage.getItem('atm_trades')||'[]');
    var n = trades.length;
    var target = 300;
    var pct = Math.min(1, n/target);
    var circ = 2*Math.PI*82;
    var fill = document.getElementById('l-prog-fill');
    var label = document.getElementById('l-prog-label');
    if (label) label.textContent = n + ' / ' + target + ' trades';
    if (fill) {
      setTimeout(function(){
        fill.style.strokeDashoffset = (circ * (1-pct)).toFixed(1);
      }, 250);
    }
  } catch(e){}
})();
</script>
